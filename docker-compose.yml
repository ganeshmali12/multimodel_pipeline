services:
  mental-health-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mental-health-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s